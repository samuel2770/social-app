<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pulse — Social</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Syne:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --card: #14141f;
  --border: #1e1e2e;
  --muted: #2a2a3d;
  --dim: #4a4a6a;
  --soft: #7a7a9a;
  --body: #b0b0cc;
  --white: #f0f0ff;
  --gold: #c8a96e;
  --gold-2: #e8c98e;
  --gold-dim: rgba(200,169,110,0.08);
  --accent: #7c6af7;
  --accent-dim: rgba(124,106,247,0.1);
  --red: #f06080;
  --green: #50d890;
  --r: 14px;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Syne', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--body);font-family:var(--sans);font-weight:300;line-height:1.6;min-height:100vh;overflow-x:hidden;}

/* Pages */
.page{display:none;min-height:100vh;}
.page.active{display:block;animation:pageIn .35s ease;}
@keyframes pageIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

/* ── AUTH ─────────────────────────────────────── */
#page-auth.active{display:flex;align-items:center;justify-content:center;}
#page-auth{
  background:
    radial-gradient(ellipse 80% 60% at 70% 20%, rgba(124,106,247,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 20% 80%, rgba(200,169,110,0.07) 0%, transparent 60%),
    var(--bg);
}
.auth-box{
  width:100%;max-width:420px;margin:2rem;
  background:rgba(15,15,26,0.95);
  border:1px solid var(--border);border-radius:20px;
  padding:2.5rem;
  box-shadow:0 40px 120px rgba(0,0,0,0.6);
}
.auth-logo{font-family:var(--serif);font-size:2rem;color:var(--white);text-align:center;margin-bottom:.2rem;}
.auth-logo span{color:var(--gold);}
.auth-sub{text-align:center;font-size:.75rem;color:var(--dim);font-family:var(--mono);letter-spacing:.1em;margin-bottom:2rem;}
.auth-tabs{display:flex;background:var(--muted);border-radius:10px;padding:4px;margin-bottom:1.75rem;}
.auth-tab{flex:1;padding:.55rem;border:none;background:none;color:var(--soft);font-family:var(--sans);font-size:.875rem;cursor:pointer;border-radius:8px;transition:all .2s;}
.auth-tab.active{background:var(--card);color:var(--white);}
.auth-form{display:none;}
.auth-form.active{display:block;}

/* Fields */
.field{margin-bottom:1rem;}
.field label{display:block;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);font-family:var(--mono);margin-bottom:.4rem;}
.field input,.field textarea,.field select{
  width:100%;background:var(--surface);border:1px solid var(--border);
  color:var(--white);padding:.72rem 1rem;border-radius:10px;
  font-family:var(--sans);font-size:.875rem;font-weight:300;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.field input:focus,.field textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim);}
.field input::placeholder,.field textarea::placeholder{color:var(--muted);}
.field textarea{resize:vertical;min-height:120px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;padding:.75rem 1.4rem;border:none;border-radius:10px;font-family:var(--sans);font-size:.875rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all .22s;white-space:nowrap;}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:var(--gold-2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(200,169,110,.3);}
.btn-full{width:100%;}
.btn-ghost{background:transparent;color:var(--body);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm{padding:.45rem .9rem;font-size:.78rem;}
.btn-danger{background:rgba(240,96,128,.1);color:var(--red);border:1px solid rgba(240,96,128,.2);}
.btn-danger:hover{background:rgba(240,96,128,.2);}
.btn-accent{background:var(--accent-dim);color:#a89af7;border:1px solid rgba(124,106,247,.25);}
.btn-accent:hover{background:rgba(124,106,247,.18);}

/* Error */
.err{background:rgba(240,96,128,.08);border:1px solid rgba(240,96,128,.2);color:var(--red);padding:.7rem 1rem;border-radius:8px;font-size:.82rem;margin-bottom:1rem;display:none;}
.err.show{display:block;}

/* ── APP SHELL ──────────────────────────────── */
#page-app.active{display:flex;}
.sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;}
.sidebar-logo{padding:1.4rem 1.5rem;font-family:var(--serif);font-size:1.5rem;color:var(--white);border-bottom:1px solid var(--border);}
.sidebar-logo span{color:var(--gold);}
.sidebar-user{padding:1.1rem 1.25rem;border-bottom:1px solid var(--border);}
.s-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1rem;color:#fff;font-weight:700;margin-bottom:.6rem;}
.s-name{font-size:.9rem;color:var(--white);font-weight:500;}
.s-handle{font-size:.72rem;color:var(--dim);font-family:var(--mono);}
.nav-links{flex:1;padding:.75rem 0;}
.nav-btn{display:flex;align-items:center;gap:.7rem;padding:.7rem 1.25rem;color:var(--soft);font-size:.85rem;cursor:pointer;transition:all .2s;border:none;background:none;width:100%;text-align:left;position:relative;font-family:var(--sans);}
.nav-btn:hover{color:var(--white);background:var(--muted);}
.nav-btn.active{color:var(--gold);}
.nav-btn.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--gold);border-radius:0 3px 3px 0;}
.nav-icon{width:18px;text-align:center;font-size:1rem;}
.sidebar-foot{padding:1rem 1.25rem;}

.main{margin-left:230px;flex:1;min-height:100vh;}
.topbar{background:rgba(8,8,16,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.topbar-title{font-family:var(--serif);font-size:1.35rem;color:var(--white);}
.content{padding:1.75rem 2rem;}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.75rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem 1.5rem;transition:all .2s;position:relative;overflow:hidden;}
.stat-card:hover{border-color:var(--muted);transform:translateY(-2px);}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity .3s;}
.stat-card:hover::after{opacity:1;}
.stat-lbl{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin-bottom:.4rem;}
.stat-val{font-family:var(--serif);font-size:1.9rem;color:var(--white);line-height:1;}
.stat-ico{position:absolute;top:1rem;right:1rem;font-size:1.3rem;opacity:.25;}

/* Dash Grid */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.dash-card-hd{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.dash-card-title{font-family:var(--serif);font-size:1.05rem;color:var(--white);}
.dash-card-bd{padding:1.25rem;}

/* Post Cards */
.post-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem;margin-bottom:1rem;transition:all .2s;}
.post-card:hover{border-color:var(--muted);transform:translateY(-1px);}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.6rem;}
.pc-title{font-family:var(--serif);font-size:1.15rem;color:var(--white);line-height:1.25;}
.pc-state{font-family:var(--mono);font-size:.62rem;padding:.18rem .55rem;border-radius:999px;flex-shrink:0;margin-left:.75rem;margin-top:.2rem;}
.state-draft{background:rgba(74,74,106,.3);color:var(--soft);border:1px solid var(--muted);}
.state-published{background:rgba(80,216,144,.1);color:var(--green);border:1px solid rgba(80,216,144,.2);}
.pc-meta{font-size:.74rem;color:var(--dim);margin-bottom:.65rem;font-family:var(--mono);}
.pc-body{font-size:.875rem;color:var(--body);line-height:1.65;margin-bottom:.85rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.pc-tags{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.85rem;}
.tag{font-family:var(--mono);font-size:.62rem;color:var(--soft);background:var(--muted);border:1px solid var(--border);padding:.12rem .45rem;border-radius:4px;}
.pc-actions{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.like-btn{display:flex;align-items:center;gap:.35rem;padding:.38rem .75rem;border-radius:8px;border:1px solid var(--border);background:none;color:var(--soft);font-size:.78rem;cursor:pointer;transition:all .2s;font-family:var(--sans);}
.like-btn:hover{border-color:var(--red);color:var(--red);}
.like-btn.liked{border-color:var(--red);color:var(--red);background:rgba(240,96,128,.08);}

/* Author row */
.author-row{display:flex;align-items:center;gap:.7rem;margin-bottom:.9rem;}
.author-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:.85rem;color:#fff;font-weight:700;flex-shrink:0;}
.author-name{font-size:.85rem;color:var(--white);font-weight:500;}
.author-handle{font-size:.7rem;color:var(--dim);font-family:var(--mono);}

/* Search */
.search-bar{display:flex;gap:.7rem;margin-bottom:1.4rem;flex-wrap:wrap;}
.search-input{flex:1;min-width:180px;background:var(--card);border:1px solid var(--border);color:var(--white);padding:.68rem 1rem;border-radius:10px;font-family:var(--sans);font-size:.85rem;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--gold);}
.search-input::placeholder{color:var(--dim);}
select.search-input option{background:var(--card);}

/* Profile */
.profile-hd{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.5rem;}
.profile-av{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1.9rem;color:#fff;font-weight:700;flex-shrink:0;}
.profile-name{font-family:var(--serif);font-size:1.55rem;color:var(--white);margin-bottom:.2rem;}
.profile-handle{font-family:var(--mono);font-size:.78rem;color:var(--gold);margin-bottom:.45rem;}
.profile-bio{font-size:.85rem;color:var(--body);margin-bottom:.9rem;}
.profile-stats{display:flex;gap:2rem;}
.ps-num{font-family:var(--serif);font-size:1.35rem;color:var(--white);display:block;}
.ps-lbl{font-size:.68rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.modal-title{font-family:var(--serif);font-size:1.35rem;color:var(--white);}
.modal-close{background:none;border:none;color:var(--soft);font-size:1.3rem;cursor:pointer;transition:color .2s;padding:.2rem;}
.modal-close:hover{color:var(--white);}

/* Empty / Loading */
.empty{text-align:center;padding:3rem 2rem;color:var(--dim);}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem;display:block;}
.loading{display:flex;align-items:center;justify-content:center;padding:2.5rem;gap:.7rem;color:var(--soft);font-size:.875rem;}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(200,169,110,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Toast */
#toast{position:fixed;bottom:1.75rem;right:1.75rem;z-index:999;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gold);padding:.9rem 1.4rem;border-radius:10px;font-size:.85rem;color:var(--white);transform:translateX(130%);transition:transform .32s cubic-bezier(.4,0,.2,1);max-width:280px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
#toast.show{transform:translateX(0);}
#toast.success{border-left-color:var(--green);}
#toast.error{border-left-color:var(--red);}

@media(max-width:900px){.stats-row{grid-template-columns:1fr 1fr;}.dash-grid{grid-template-columns:1fr;}}
@media(max-width:640px){.sidebar{display:none;}.main{margin-left:0;}}
</style>
</head>
<body>

<!-- ══════════════════════════════════
  AUTH PAGE
══════════════════════════════════ -->
<div id="page-auth" class="page active">
  <div class="auth-box">
    <div class="auth-logo">Pulse<span>.</span></div>
    <div class="auth-sub">// connect · create · flow</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('signin')">Sign In</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">Create Account</button>
    </div>

    <!-- Sign In Form -->
    <div class="auth-form active" id="form-signin">
      <div class="err" id="si-err"></div>
      <div class="field"><label>Email</label><input id="si-email" type="email" placeholder="you@example.com"/></div>
      <div class="field"><label>Password</label><input id="si-password" type="password" placeholder="••••••••"/></div>
      <button class="btn btn-gold btn-full" id="btn-si" onclick="doSignin()">Sign In</button>
    </div>

    <!-- Sign Up Form -->
    <div class="auth-form" id="form-signup">
      <div class="err" id="su-err"></div>
      <div class="field field-row">
        <div class="field" style="margin-bottom:0"><label>First Name</label><input id="su-fn" placeholder="Ada"/></div>
        <div class="field" style="margin-bottom:0"><label>Last Name</label><input id="su-ln" placeholder="Lovelace"/></div>
      </div>
      <div class="field"><label>Username</label><input id="su-un" placeholder="ada_lovelace"/></div>
      <div class="field"><label>Email</label><input id="su-em" type="email" placeholder="ada@example.com"/></div>
      <div class="field"><label>Password</label><input id="su-pw" type="password" placeholder="Min 6 characters"/></div>
      <div class="field"><label>Bio (optional)</label><input id="su-bio" placeholder="Tell the world about you…"/></div>
      <button class="btn btn-gold btn-full" id="btn-su" onclick="doSignup()">Create Account</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
  APP SHELL
══════════════════════════════════ -->
<div id="page-app" class="page">

  <aside class="sidebar">
    <div class="sidebar-logo">Pulse<span>.</span></div>
    <div class="sidebar-user">
      <div class="s-avatar" id="s-av">?</div>
      <div class="s-name" id="s-name">—</div>
      <div class="s-handle" id="s-handle">@—</div>
    </div>
    <nav class="nav-links">
      <button class="nav-btn active" id="nav-dashboard" onclick="goTo('dashboard')"><span class="nav-icon">⬡</span>Dashboard</button>
      <button class="nav-btn" id="nav-feed" onclick="goTo('feed')"><span class="nav-icon">◈</span>Explore</button>
      <button class="nav-btn" id="nav-my-posts" onclick="goTo('my-posts')"><span class="nav-icon">◇</span>My Posts</button>
      <button class="nav-btn" id="nav-profile" onclick="goTo('profile')"><span class="nav-icon">○</span>Profile</button>
    </nav>
    <div class="sidebar-foot">
      <button class="btn btn-ghost btn-full btn-sm" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div><button class="btn btn-gold btn-sm" onclick="openCreatePost()">+ New Post</button></div>
    </div>

    <!-- Dashboard -->
    <div class="content" id="view-dashboard">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-ico">◇</div><div class="stat-lbl">My Posts</div><div class="stat-val" id="st-posts">—</div></div>
        <div class="stat-card"><div class="stat-ico">♡</div><div class="stat-lbl">Total Likes</div><div class="stat-val" id="st-likes">—</div></div>
        <div class="stat-card"><div class="stat-ico">↑</div><div class="stat-lbl">Following</div><div class="stat-val" id="st-following">—</div></div>
        <div class="stat-card"><div class="stat-ico">↓</div><div class="stat-lbl">Followers</div><div class="stat-val" id="st-followers">—</div></div>
      </div>
      <div class="dash-grid">
        <div class="dash-card">
          <div class="dash-card-hd">
            <div class="dash-card-title">My Recent Posts</div>
            <button class="btn btn-ghost btn-sm" onclick="goTo('my-posts')">See All</button>
          </div>
          <div class="dash-card-bd" id="dash-my-posts"><div class="loading"><span class="spinner"></span> Loading…</div></div>
        </div>
        <div class="dash-card">
          <div class="dash-card-hd">
            <div class="dash-card-title">Trending Posts</div>
            <button class="btn btn-ghost btn-sm" onclick="goTo('feed')">Explore</button>
          </div>
          <div class="dash-card-bd" id="dash-trending"><div class="loading"><span class="spinner"></span> Loading…</div></div>
        </div>
      </div>
    </div>

    <!-- Feed / Explore -->
    <div class="content" id="view-feed" style="display:none">
      <div class="search-bar">
        <input class="search-input" id="feed-q" placeholder="Search by title, author or tag…" oninput="debounce()"/>
        <select class="search-input" id="feed-sort" onchange="loadFeed()" style="max-width:160px">
          <option value="timestamp">Latest</option>
          <option value="like_count">Most Liked</option>
          <option value="comment_count">Most Discussed</option>
        </select>
      </div>
      <div id="feed-list"></div>
      <div id="feed-more" style="text-align:center;margin-top:1.5rem"></div>
    </div>

    <!-- My Posts -->
    <div class="content" id="view-my-posts" style="display:none">
      <div class="search-bar">
        <select class="search-input" id="mp-filter" onchange="loadMyPosts()" style="max-width:180px">
          <option value="">All Posts</option>
          <option value="draft">Drafts Only</option>
          <option value="published">Published Only</option>
        </select>
      </div>
      <div id="mp-list"></div>
    </div>

    <!-- Profile -->
    <div class="content" id="view-profile" style="display:none">
      <div class="profile-hd">
        <div class="profile-av" id="pf-av">?</div>
        <div>
          <div class="profile-name" id="pf-name">—</div>
          <div class="profile-handle" id="pf-handle">@—</div>
          <div class="profile-bio" id="pf-bio"></div>
          <div class="profile-stats">
            <div><span class="ps-num" id="pf-posts">—</span><span class="ps-lbl">Posts</span></div>
            <div><span class="ps-num" id="pf-following">—</span><span class="ps-lbl">Following</span></div>
            <div><span class="ps-num" id="pf-followers">—</span><span class="ps-lbl">Followers</span></div>
          </div>
        </div>
      </div>
      <div id="pf-list"></div>
    </div>
  </main>
</div>

<!-- Create / Edit Modal -->
<div class="modal-overlay" id="modal-post">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="modal-post-title">New Post</div>
      <button class="modal-close" onclick="closeModal('modal-post')">✕</button>
    </div>
    <div class="err" id="post-err"></div>
    <div class="field"><label>Title</label><input id="pt-title" placeholder="Give your post a great title…"/></div>
    <div class="field"><label>Content</label><textarea id="pt-content" placeholder="What's on your mind?"></textarea></div>
    <div class="field"><label>Tags (comma separated)</label><input id="pt-tags" placeholder="tech, design, nodejs"/></div>
    <input type="hidden" id="pt-id"/>
    <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem">
      <button class="btn btn-ghost" onclick="closeModal('modal-post')">Cancel</button>
      <button class="btn btn-gold" onclick="savePost()">Save Draft</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ─────────────────────────────────────
let token = localStorage.getItem('pulse_token') || null;
let currentUser = JSON.parse(localStorage.getItem('pulse_user') || 'null');
let feedPage = 1;
let feedTimer;

// ── Boot ──────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (token && currentUser) {
    showApp();
  } else {
    showPage('page-auth');
  }
});

// ── Page helpers ──────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showApp() {
  showPage('page-app');
  updateSidebar();
  goTo('dashboard');
}

function goTo(view) {
  const views = ['dashboard','feed','my-posts','profile'];
  views.forEach(v => {
    document.getElementById('view-' + v).style.display = 'none';
    const n = document.getElementById('nav-' + v);
    if (n) n.classList.remove('active');
  });
  document.getElementById('view-' + view).style.display = 'block';
  const nav = document.getElementById('nav-' + view);
  if (nav) nav.classList.add('active');

  const titles = {dashboard:'Dashboard', feed:'Explore', 'my-posts':'My Posts', profile:'Profile'};
  document.getElementById('topbar-title').textContent = titles[view] || 'Pulse';

  if (view === 'dashboard') loadDashboard();
  if (view === 'feed') { feedPage = 1; loadFeed(); }
  if (view === 'my-posts') loadMyPosts();
  if (view === 'profile') loadProfile();
}

function updateSidebar() {
  if (!currentUser) return;
  const initials = ((currentUser.first_name||'?')[0] + (currentUser.last_name||'?')[0]).toUpperCase();
  document.getElementById('s-av').textContent = initials;
  document.getElementById('s-name').textContent = currentUser.first_name + ' ' + currentUser.last_name;
  document.getElementById('s-handle').textContent = '@' + currentUser.username;
}

// ── API ───────────────────────────────────────
async function api(method, path, body) {
  const headers = {'Content-Type':'application/json'};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const opts = {method, headers};
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch('/api' + path, opts);
    const data = await r.json();
    return {ok: r.ok, status: r.status, data};
  } catch(e) {
    return {ok: false, status: 0, data: {message: 'Network error'}};
  }
}

// ── Toast ──────────────────────────────────────
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  setTimeout(() => el.className = '', 3000);
}

// ── Auth Tab ──────────────────────────────────
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', ['signin','signup'][i] === tab));
  document.getElementById('form-signin').classList.toggle('active', tab === 'signin');
  document.getElementById('form-signup').classList.toggle('active', tab === 'signup');
}

// ── Sign In ───────────────────────────────────
async function doSignin() {
  const errEl = document.getElementById('si-err');
  errEl.classList.remove('show');
  const btn = document.getElementById('btn-si');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  const res = await api('POST', '/auth/signin', {
    email: document.getElementById('si-email').value.trim(),
    password: document.getElementById('si-password').value,
  });

  btn.textContent = 'Sign In';
  btn.disabled = false;

  if (res.ok) {
    token = res.data.token;
    currentUser = res.data.user;
    localStorage.setItem('pulse_token', token);
    localStorage.setItem('pulse_user', JSON.stringify(currentUser));
    toast('Welcome back, ' + currentUser.first_name + '!', 'success');
    showApp();
  } else {
    errEl.textContent = res.data.message || 'Sign in failed. Check your credentials.';
    errEl.classList.add('show');
  }
}

// ── Sign Up ───────────────────────────────────
async function doSignup() {
  const errEl = document.getElementById('su-err');
  errEl.classList.remove('show');
  const btn = document.getElementById('btn-su');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  const res = await api('POST', '/auth/signup', {
    first_name: document.getElementById('su-fn').value.trim(),
    last_name:  document.getElementById('su-ln').value.trim(),
    username:   document.getElementById('su-un').value.trim(),
    email:      document.getElementById('su-em').value.trim(),
    password:   document.getElementById('su-pw').value,
    bio:        document.getElementById('su-bio').value.trim(),
  });

  btn.textContent = 'Create Account';
  btn.disabled = false;

  if (res.ok) {
    token = res.data.token;
    currentUser = res.data.user;
    localStorage.setItem('pulse_token', token);
    localStorage.setItem('pulse_user', JSON.stringify(currentUser));
    toast('Welcome to Pulse, ' + currentUser.first_name + '!', 'success');
    showApp();
  } else {
    errEl.textContent = res.data.message || 'Sign up failed. Please try again.';
    errEl.classList.add('show');
  }
}

// ── Logout ────────────────────────────────────
function logout() {
  token = null; currentUser = null;
  localStorage.removeItem('pulse_token');
  localStorage.removeItem('pulse_user');
  showPage('page-auth');
}

// ── Dashboard ─────────────────────────────────
async function loadDashboard() {
  const [myRes, followingRes, followersRes, trendingRes] = await Promise.all([
    api('GET', '/posts/me?limit=50'),
    api('GET', '/users/me/following'),
    api('GET', '/users/me/followers'),
    api('GET', '/posts?limit=3&sort=like_count'),
  ]);

  if (myRes.ok) {
    const posts = myRes.data.posts || [];
    document.getElementById('st-posts').textContent = myRes.data.pagination?.total || posts.length;
    const likes = posts.reduce((s, p) => s + (p.like_count || 0), 0);
    document.getElementById('st-likes').textContent = likes;

    const el = document.getElementById('dash-my-posts');
    if (posts.length === 0) {
      el.innerHTML = '<div class="empty"><span class="empty-icon">◇</span><div>No posts yet. Create your first!</div></div>';
    } else {
      el.innerHTML = posts.slice(0, 4).map(p => `
        <div style="padding:.65rem 0;border-bottom:1px solid var(--border);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.2rem">
            <div style="font-family:var(--serif);color:var(--white);font-size:.9rem">${esc(p.title)}</div>
            <span class="pc-state state-${p.state}">${p.state}</span>
          </div>
          <div style="font-size:.7rem;color:var(--dim);font-family:var(--mono)">♡ ${p.like_count} · ${timeAgo(p.createdAt)}</div>
        </div>`).join('');
    }
  }

  if (followingRes.ok) document.getElementById('st-following').textContent = followingRes.data.pagination?.total || 0;
  if (followersRes.ok) document.getElementById('st-followers').textContent = followersRes.data.pagination?.total || 0;

  const tEl = document.getElementById('dash-trending');
  if (trendingRes.ok && trendingRes.data.posts?.length > 0) {
    tEl.innerHTML = trendingRes.data.posts.map(p => `
      <div style="padding:.65rem 0;border-bottom:1px solid var(--border);">
        <div style="font-family:var(--serif);color:var(--white);font-size:.9rem;margin-bottom:.2rem">${esc(p.title)}</div>
        <div style="font-size:.7rem;color:var(--dim);font-family:var(--mono)">by @${p.author?.username} · ♡ ${p.like_count}</div>
      </div>`).join('');
  } else {
    tEl.innerHTML = '<div class="empty"><div>No public posts yet.</div></div>';
  }
}

// ── Feed ──────────────────────────────────────
function debounce() {
  clearTimeout(feedTimer);
  feedTimer = setTimeout(() => { feedPage = 1; loadFeed(); }, 420);
}

async function loadFeed(append = false) {
  const q = document.getElementById('feed-q')?.value || '';
  const sort = document.getElementById('feed-sort')?.value || 'timestamp';
  const listEl = document.getElementById('feed-list');
  const moreEl = document.getElementById('feed-more');

  if (!append) {
    feedPage = 1;
    listEl.innerHTML = '<div class="loading"><span class="spinner"></span> Loading posts…</div>';
    moreEl.innerHTML = '';
  }

  let qs = `/posts?page=${feedPage}&limit=8&sort=${sort}`;
  if (q) qs += '&search=' + encodeURIComponent(q);

  const res = await api('GET', qs);
  if (!res.ok) { listEl.innerHTML = '<div class="empty">Failed to load posts.</div>'; return; }

  const {posts, pagination} = res.data;

  if (!append) listEl.innerHTML = '';

  if (posts.length === 0 && !append) {
    listEl.innerHTML = '<div class="empty"><span class="empty-icon">◈</span><div>No posts found.</div></div>';
    moreEl.innerHTML = '';
    return;
  }

  posts.forEach(p => listEl.insertAdjacentHTML('beforeend', renderCard(p, false)));

  moreEl.innerHTML = pagination.has_next
    ? `<button class="btn btn-ghost" onclick="feedPage++;loadFeed(true)">Load More</button>`
    : '';
}

// ── My Posts ──────────────────────────────────
async function loadMyPosts() {
  const filter = document.getElementById('mp-filter')?.value || '';
  const listEl = document.getElementById('mp-list');
  listEl.innerHTML = '<div class="loading"><span class="spinner"></span> Loading…</div>';

  let qs = '/posts/me?limit=20';
  if (filter) qs += '&state=' + filter;

  const res = await api('GET', qs);
  if (!res.ok) { listEl.innerHTML = '<div class="empty">Failed to load.</div>'; return; }

  const {posts} = res.data;
  if (posts.length === 0) {
    listEl.innerHTML = '<div class="empty"><span class="empty-icon">◇</span><div>No posts here yet.</div></div>';
    return;
  }
  listEl.innerHTML = posts.map(p => renderCard(p, true)).join('');
}

// ── Profile ───────────────────────────────────
async function loadProfile() {
  if (!currentUser) return;
  const initials = ((currentUser.first_name||'?')[0] + (currentUser.last_name||'?')[0]).toUpperCase();
  document.getElementById('pf-av').textContent = initials;
  document.getElementById('pf-name').textContent = currentUser.first_name + ' ' + currentUser.last_name;
  document.getElementById('pf-handle').textContent = '@' + currentUser.username;
  document.getElementById('pf-bio').textContent = currentUser.bio || 'No bio added yet.';

  const [postsRes, followingRes, followersRes] = await Promise.all([
    api('GET', '/posts/me?limit=50'),
    api('GET', '/users/me/following'),
    api('GET', '/users/me/followers'),
  ]);

  if (postsRes.ok) {
    document.getElementById('pf-posts').textContent = postsRes.data.pagination?.total || 0;
    const listEl = document.getElementById('pf-list');
    const posts = postsRes.data.posts || [];
    listEl.innerHTML = posts.length === 0
      ? '<div class="empty"><span class="empty-icon">◇</span><div>No posts yet.</div></div>'
      : posts.map(p => renderCard(p, true)).join('');
  }
  if (followingRes.ok) document.getElementById('pf-following').textContent = followingRes.data.pagination?.total || 0;
  if (followersRes.ok) document.getElementById('pf-followers').textContent = followersRes.data.pagination?.total || 0;
}

// ── Render Card ───────────────────────────────
function renderCard(p, isOwner) {
  const tags = (p.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
  const a = p.author || {};
  const av = a.first_name ? (a.first_name[0] + (a.last_name?.[0]||'')).toUpperCase() : '?';

  const authorRow = !isOwner ? `
    <div class="author-row">
      <div class="author-av">${av}</div>
      <div><div class="author-name">${esc(a.first_name||'')} ${esc(a.last_name||'')}</div>
      <div class="author-handle">@${esc(a.username||'')}</div></div>
    </div>` : '';

  const actions = isOwner ? `
    ${p.state==='draft' ? `<button class="btn btn-accent btn-sm" onclick="publishPost('${p._id}')">Publish</button>` : ''}
    <button class="btn btn-ghost btn-sm" onclick="editPost('${p._id}')">Edit</button>
    <button class="btn btn-danger btn-sm" onclick="deletePost('${p._id}')">Delete</button>`
    : `<button class="like-btn" id="like-${p._id}" onclick="toggleLike('${p._id}')">♡ ${p.like_count||0}</button>`;

  return `
    <div class="post-card" id="pc-${p._id}" data-post='${JSON.stringify({_id:p._id,title:p.title,content:p.content,tags:p.tags||[]})}'>
      ${authorRow}
      <div class="pc-top">
        <div class="pc-title">${esc(p.title)}</div>
        <span class="pc-state state-${p.state}">${p.state}</span>
      </div>
      <div class="pc-meta">${timeAgo(p.createdAt)} · ${p.read_time||1} min read</div>
      <div class="pc-body">${esc(p.content)}</div>
      ${tags ? `<div class="pc-tags">${tags}</div>` : ''}
      <div class="pc-actions">${actions}</div>
    </div>`;
}

// ── Post Actions ──────────────────────────────
function openCreatePost() {
  document.getElementById('pt-id').value = '';
  document.getElementById('pt-title').value = '';
  document.getElementById('pt-content').value = '';
  document.getElementById('pt-tags').value = '';
  document.getElementById('modal-post-title').textContent = 'New Post';
  document.getElementById('post-err').classList.remove('show');
  openModal('modal-post');
}

function editPost(id) {
  const card = document.getElementById('pc-' + id);
  if (!card) return;
  const data = JSON.parse(card.dataset.post || '{}');
  document.getElementById('pt-id').value = data._id || id;
  document.getElementById('pt-title').value = data.title || '';
  document.getElementById('pt-content').value = data.content || '';
  document.getElementById('pt-tags').value = (data.tags || []).join(', ');
  document.getElementById('modal-post-title').textContent = 'Edit Post';
  document.getElementById('post-err').classList.remove('show');
  openModal('modal-post');
}

async function savePost() {
  const id      = document.getElementById('pt-id').value;
  const title   = document.getElementById('pt-title').value.trim();
  const content = document.getElementById('pt-content').value.trim();
  const tagsRaw = document.getElementById('pt-tags').value;
  const tags    = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
  const errEl   = document.getElementById('post-err');

  if (!title || !content) {
    errEl.textContent = 'Title and content are both required.';
    errEl.classList.add('show');
    return;
  }

  const res = await api(id ? 'PATCH' : 'POST', id ? `/posts/${id}` : '/posts', {title, content, tags});

  if (res.ok) {
    closeModal('modal-post');
    toast(id ? 'Post updated!' : 'Draft created!', 'success');
    loadMyPosts();
    loadDashboard();
  } else {
    errEl.textContent = res.data.message || 'Failed to save.';
    errEl.classList.add('show');
  }
}

async function publishPost(id) {
  const res = await api('PATCH', `/posts/${id}/publish`);
  if (res.ok) { toast('Post published!', 'success'); loadMyPosts(); loadDashboard(); }
  else toast(res.data.message || 'Failed to publish.', 'error');
}

async function deletePost(id) {
  if (!confirm('Delete this post? This cannot be undone.')) return;
  const res = await api('DELETE', `/posts/${id}`);
  if (res.ok) {
    toast('Post deleted.', 'success');
    document.getElementById('pc-' + id)?.remove();
    loadDashboard();
  } else toast(res.data.message || 'Failed to delete.', 'error');
}

async function toggleLike(id) {
  const btn = document.getElementById('like-' + id);
  const liked = btn?.classList.contains('liked');
  const res = await api(liked ? 'DELETE' : 'POST', `/posts/${id}/like`);
  if (res.ok) {
    if (btn) { btn.textContent = '♡ ' + res.data.like_count; btn.classList.toggle('liked', !liked); }
  } else toast(res.data.message, 'error');
}

// ── Modal ──────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.getElementById('modal-post').addEventListener('click', e => { if (e.target.id === 'modal-post') closeModal('modal-post'); });

// ── Helpers ────────────────────────────────────
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function timeAgo(d) {
  const m = Math.floor((Date.now() - new Date(d)) / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m/60);
  if (h < 24) return h + 'h ago';
  const dy = Math.floor(h/24);
  if (dy < 30) return dy + 'd ago';
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
